# Refined SVG creation for "As Nasim"
# Incorporating the specific design language: 
# - Thick blocky sans-serif
# - The 'A' in Nasim featuring a circular punch-out (dot)
# - The yellow double-chevron accent
# - The thick underline

svg_code = """<svg width="1000" height="400" viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
    <g transform="translate(100, 100)">
        
        <g transform="translate(0, -50) scale(0.8)">
            <path d="M0,0 L12,12 L0,24 L8,24 L20,12 L8,0 Z" fill="#E6DB1E" />
            <path d="M15,0 L27,12 L15,24 L23,24 L35,12 L23,0 Z" fill="#E6DB1E" />
        </g>

        <text x="0" y="100" font-family="Arial Black, sans-serif" font-size="120" fill="white" font-weight="900" letter-spacing="-2">AS</text>
        
        <text x="210" y="100" font-family="Arial Black, sans-serif" font-size="120" fill="white" font-weight="900" letter-spacing="-2">N</text>
        
        <g transform="translate(325, 0)">
            <path d="M0,100 L55,0 L110,100 L85,100 L78,80 L32,80 L25,100 Z" fill="white" />
            <circle cx="55" cy="65" r="12" fill="black" />
        </g>
        
        <text x="445" y="100" font-family="Arial Black, sans-serif" font-size="120" fill="white" font-weight="900" letter-spacing="-2">SIM</text>

        <rect x="0" y="140" width="760" height="12" fill="white" />
    </g>
</svg>
"""

file_path = "as_nasim_professional_logo.svg"
with open(file_path, "w") as f:
    f.write(svg_code)

print(file_path)